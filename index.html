<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>APEX RUN</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{height:100%;overflow:hidden;background:#000;overscroll-behavior:none;touch-action:none}
body{display:flex;align-items:center;justify-content:center;position:fixed;inset:0}
canvas{display:block}
#hud{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:5}
.hrow{display:flex;align-items:flex-start;justify-content:space-between;padding:8px 14px 0}
.hcell{display:flex;flex-direction:column;gap:1px}
.hcell.c{align-items:center;flex:1}
.hcell.r{align-items:flex-end}
.hl{font:11px/1 'Courier New',monospace;color:#ffffff55;letter-spacing:1px;text-transform:uppercase}
.hv{font:bold 20px/1 'Courier New',monospace;color:#fff;text-shadow:0 0 8px currentColor;letter-spacing:1px}
#hLv{color:#ff4466;text-shadow:0 0 8px #ff4466}
#hCo{position:absolute;left:50%;top:60px;transform:translateX(-50%);font:bold 18px/1 'Courier New',monospace;color:#ffcc00;text-shadow:0 0 10px #ffcc00;letter-spacing:2px;opacity:0;transition:opacity .3s;pointer-events:none}
#wWrap{position:absolute;right:14px;top:62px;width:110px}
#wLbl{font:10px/1 'Courier New',monospace;color:#00ccff;text-align:right;margin-bottom:3px;letter-spacing:1px}
#wBg{background:#111;border:1px solid #00ccff44;border-radius:4px;height:8px;overflow:hidden}
#wBar{height:100%;background:linear-gradient(90deg,#0066ff,#00ccff);border-radius:4px;width:0%;transition:width .1s}
#bWrap{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);width:340px;display:none}
#bLbl{font:12px/1 'Courier New',monospace;color:#ff0044;text-align:center;margin-bottom:4px;letter-spacing:2px;text-shadow:0 0 8px #ff0044}
#bBg{background:#111;border:1px solid #ff004466;border-radius:4px;height:14px;overflow:hidden}
#bBar{height:100%;background:linear-gradient(90deg,#aa0000,#ff0044);border-radius:4px;transition:width .2s}
#btns{position:fixed;bottom:0;left:0;width:100%;height:50%;pointer-events:none;z-index:8;display:none}
.tbtn{position:absolute;border:2px solid;border-radius:50%;width:58px;height:58px;display:flex;align-items:center;justify-content:center;font:bold 13px/1 'Courier New',monospace;letter-spacing:1px;pointer-events:all;opacity:.72;touch-action:none}
#bJ{bottom:92px;right:82px;border-color:#00ccff;color:#00ccff}
#bS{bottom:20px;right:82px;border-color:#00ccff;color:#00ccff}
#bA{bottom:92px;right:158px;border-color:#ff8800;color:#ff8800}
#bW{bottom:20px;right:158px;border-color:#aa00ff;color:#aa00ff}
#ov{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 35%,#001428 0%,#000814 55%,#000 100%)}
#ov h1{font:bold clamp(36px,9vw,72px)/1 'Courier New',monospace;color:#00ccff;text-shadow:0 0 20px #00ccff,0 0 50px #00ccff;letter-spacing:8px;margin-bottom:8px;animation:gp 2s ease-in-out infinite}
@keyframes gp{0%,100%{text-shadow:0 0 20px #00ccff,0 0 40px #00ccff}50%{text-shadow:0 0 30px #00ccff,0 0 70px #00ccff,0 0 110px #00ccff}}
#ov .sub{font:clamp(10px,2.2vw,15px)/1 'Courier New',monospace;color:#0066ff88;letter-spacing:5px;margin-bottom:32px}
#ov .stats{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:34px}
#ovSc{font:bold clamp(14px,3.5vw,24px)/1 'Courier New',monospace;color:#ffcc00;text-shadow:0 0 8px #ffcc00;letter-spacing:2px}
#ovBe{font:bold clamp(12px,3vw,20px)/1 'Courier New',monospace;color:#ff8800;text-shadow:0 0 8px #ff8800;letter-spacing:2px}
#ovBtn{font:clamp(14px,3vw,20px)/1 'Courier New',monospace;background:none;border:2px solid #00ccff;color:#00ccff;padding:13px 44px;cursor:pointer;letter-spacing:4px;text-shadow:0 0 8px #00ccff;box-shadow:0 0 14px #00ccff33;transition:all .2s}
#ovBtn:hover{background:#00ccff22;box-shadow:0 0 26px #00ccff66}
#ovBtn:active{transform:scale(.97)}
#ovHint{font:clamp(9px,1.7vw,12px)/2 'Courier New',monospace;color:#ffffff33;margin-top:22px;letter-spacing:1px;text-align:center}
#dFlash{position:fixed;inset:0;z-index:15;pointer-events:none;display:flex;align-items:center;justify-content:center;font:bold clamp(20px,4vw,36px)/1 'Courier New',monospace;letter-spacing:6px;opacity:0;transition:opacity .5s}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hrow">
    <div class="hcell"><span class="hl">SCORE</span><span class="hv" id="hSc">0</span></div>
    <div class="hcell c"><span class="hl">DISTANCE</span><span class="hv" id="hDi">0m</span></div>
    <div class="hcell r"><span class="hl">LIVES</span><span class="hv" id="hLv">♥♥♥</span></div>
  </div>
  <div id="hCo"></div>
  <div id="wWrap"><div id="wLbl">WEB POWER</div><div id="wBg"><div id="wBar"></div></div></div>
  <div id="bWrap"><div id="bLbl">⚠ BOSS ⚠</div><div id="bBg"><div id="bBar"></div></div></div>
</div>
<div id="btns">
  <div class="tbtn" id="bJ">↑</div>
  <div class="tbtn" id="bS">↓</div>
  <div class="tbtn" id="bA">ATK</div>
  <div class="tbtn" id="bW">WEB</div>
</div>
<div id="ov">
  <h1>APEX RUN</h1>
  <div class="sub">INFINITE CITY RUNNER</div>
  <div class="stats"><div id="ovSc"></div><div id="ovBe"></div></div>
  <button id="ovBtn">PLAY</button>
  <div id="ovHint">SPACE/↑ JUMP &nbsp;·&nbsp; ↓ SLIDE &nbsp;·&nbsp; Z/X ATTACK &nbsp;·&nbsp; Q/F WEB SWING<br>COLLECT SHARDS TO CHARGE WEB · ATTACK ENEMIES TO SCORE</div>
</div>
<div id="dFlash"></div>
<script>
'use strict';

// ── Canvas setup ──────────────────────────────────────────────────────────────
const GW=800, GH=450;
const cv=document.getElementById('c'), cx=cv.getContext('2d');
cv.width=GW; cv.height=GH;
function fitCV(){
  const s=Math.min(innerWidth/GW,innerHeight/GH);
  cv.style.cssText=`width:${GW*s}px;height:${GH*s}px`;
}
fitCV(); addEventListener('resize',fitCV);

// ── Constants ─────────────────────────────────────────────────────────────────
const GY=370;            // ground surface Y
const PW=32, PH=54;      // player width / standing height
const PSH=22;            // player slide height
const JUMP1=-700, JUMP2=-520;
const GRAV=2000;
const PLX=130;
const MRG=5;             // hitbox inset
const LS='apexRun_v3';

// Palettes
const DIMS=[
  {n:'NEON CITY',   b0:'#000814',b1:'#001428',ac:'#00e5ff',gn:'#001428',gw:'#00e5ff'},
  {n:'CRIMSON ZONE',b0:'#140000',b1:'#280800',ac:'#ff6600',gn:'#1e0800',gw:'#ff4400'},
  {n:'MATRIX GRID', b0:'#001400',b1:'#001e00',ac:'#00ff41',gn:'#001900',gw:'#00ff41'},
  {n:'VOID REALM',  b0:'#080010',b1:'#0c0022',ac:'#cc88ff',gn:'#0a0018',gw:'#aa44ff'},
  {n:'SOLAR BURST', b0:'#140800',b1:'#281400',ac:'#ffdd00',gn:'#1c1000',gw:'#ffaa00'},
];

// ── Audio ─────────────────────────────────────────────────────────────────────
let AC=null;
function uAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();}
function snd(type){
  if(!AC||AC.state!=='running')return;
  const t=AC.currentTime,g=AC.createGain(),o=AC.createOscillator();
  g.connect(AC.destination);o.connect(g);
  const M={
    jump: [()=>{o.type='sine';o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(660,t+.1);},()=>{g.gain.setValueAtTime(.13,t);g.gain.exponentialRampToValueAtTime(.001,t+.13);},.13],
    slide:[()=>{o.type='square';o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(90,t+.1);},()=>{g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);},.12],
    shard:[()=>{o.type='sine';o.frequency.setValueAtTime(900,t);o.frequency.exponentialRampToValueAtTime(1800,t+.07);},()=>{g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.09);},.09],
    punch:[()=>{o.type='square';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(160,t+.1);},()=>{g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);},.12],
    hit:  [()=>{o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(60,t+.2);},()=>{g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.22);},.22],
    web:  [()=>{o.type='sine';o.frequency.setValueAtTime(260,t);o.frequency.exponentialRampToValueAtTime(1040,t+.22);},()=>{g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);},.25],
    dim:  [()=>{o.type='sine';o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(1760,t+.28);},()=>{g.gain.setValueAtTime(.14,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);},.3],
    over: [()=>{o.type='sawtooth';o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(50,t+.7);},()=>{g.gain.setValueAtTime(.28,t);g.gain.exponentialRampToValueAtTime(.001,t+.75);},.75],
    boss: [()=>{o.type='square';o.frequency.setValueAtTime(150,t);o.frequency.setValueAtTime(80,t+.15);},()=>{g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.35);},.35],
  };
  const c=M[type];if(!c)return;
  c[0]();c[1]();o.start(t);o.stop(t+c[2]);
}

// ── State ─────────────────────────────────────────────────────────────────────
let running=false,over=false;
let score=0,meters=0,lives=3,combo=0,comboT=0;
let spd=300,dimIdx=0,nextDimM=700;
let webM=0,webOn=false,webT=0;
let flashT=0,flashCol='#fff';
let spawnT=0,spawnI=1.6;
let bossOn=false,nextBossM=900;
let best=+localStorage.getItem(LS)||0;

let pl={};
function resetPl(){
  pl={x:PLX,y:GY-PH,vy:0,jumps:0,
      sliding:false,slideT:0,
      atk:false,atkT:0,
      inv:false,invT:0,
      runF:0,runT:0,webAng:0};
}

// Entity arrays
let walls=[],foes=[],shards=[],bolts=[],parts=[],bldgs=[],boss=null;

// ── Buildings ─────────────────────────────────────────────────────────────────
function mkBldg(fresh){
  const layer=Math.random()<.5?0:1;
  const w=45+Math.random()*110,h=80+Math.random()*290;
  const wins=[];
  for(let i=0;i<~~(w/22)+1;i++)
    for(let j=0;j<~~(h/28)+1;j++)
      if(Math.random()>.4)wins.push({x:7+i*22,y:7+j*28});
  return{x:fresh?GW+w:Math.random()*GW,y:GY-h,w,h,layer,wins};
}
function initBldgs(){bldgs=[];for(let i=0;i<22;i++)bldgs.push(mkBldg(false));}

// ── Obstacles ─────────────────────────────────────────────────────────────────
// Gate: y=0,h=340 → bottom at 340. Sliding player hitbox top = GY-PH+(PH-PSH)+MRG = 370-54+32+5=353 > 340 → CLEARS
// Wall: sits on ground → jump over
const OT=[
  {id:'wall',  y:GY-62, w:24,h:62},
  {id:'crate', y:GY-38, w:46,h:38},
  {id:'spikes',y:GY-18, w:72,h:18},
  {id:'fence', y:GY-50, w:68,h:50},
  {id:'gate',  y:0,     w:28,h:340},
];

function spawnObst(){
  const d=OT[~~(Math.random()*OT.length)];
  walls.push({x:GW+40,y:d.y,w:d.w,h:d.h,id:d.id});
}
function spawnFoe(){
  const r=Math.random();
  const id=r<.35?'flyer':r<.65?'walker':'gunner';
  const fly=id==='flyer';
  foes.push({
    x:GW+40,
    y:fly?GY-PH-55-Math.random()*65:GY-PH,
    w:36,h:fly?28:PH,
    id,hp:id==='gunner'?2:1,maxHp:id==='gunner'?2:1,
    col:fly?'#ff8800':id==='gunner'?'#cc44ff':'#ff3355',
    dead:false,deathT:0,phaseT:0,
    shootCd:id==='gunner'?1.8+Math.random():99,
  });
}
function spawnShards(){
  const n=3+~~(Math.random()*5);
  const by=GY-PH-30-Math.random()*100;
  const web2=Math.random()<.07,shld=!web2&&Math.random()<.04;
  for(let i=0;i<n;i++)
    shards.push({x:GW+40+i*46,y:by+Math.sin(i*.9)*22,
      r:web2||shld?14:8.5,type:web2?'web':shld?'shield':'shard',
      ang:Math.random()*Math.PI*2,got:false});
}
function doSpawn(){
  const r=Math.random();
  if(r<.33)spawnObst();
  else if(r<.6)spawnFoe();
  else spawnShards();
}

function spawnBoss(){
  bossOn=true;
  boss={x:GW-130,y:GY-PH-80,w:80,h:80+PH,
    hp:12,maxHp:12,phaseT:0,shootCd:1.2,movDir:1,
    dead:false,deathT:0};
  document.getElementById('bWrap').style.display='block';
  snd('boss');
}

// ── Particles ─────────────────────────────────────────────────────────────────
function burst(x,y,col,n,sp){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=sp*(.5+Math.random());
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-sp*.2,
      life:.3+Math.random()*.5,maxLife:.8,col,sz:2+Math.random()*4});
  }
}
function fTxt(x,y,txt,col){
  parts.push({x,y,vx:0,vy:-50,life:.85,maxLife:.85,col,sz:0,text:txt});
}

// ── Collision ─────────────────────────────────────────────────────────────────
function aabb(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}

// ── Input ─────────────────────────────────────────────────────────────────────
const K={};
document.addEventListener('keydown',e=>{
  uAC();K[e.code]=true;
  if(!running)return;
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){doJump();e.preventDefault();}
  if(e.code==='ArrowDown'||e.code==='KeyS'){doSlide();e.preventDefault();}
  if(e.code==='KeyZ'||e.code==='KeyX'||e.code==='KeyE')doAtk();
  if(e.code==='KeyQ'||e.code==='KeyF')doWeb();
});
document.addEventListener('keyup',e=>{delete K[e.code];});

let _tx=0,_ty=0,_tt=0;
cv.addEventListener('touchstart',e=>{uAC();_tx=e.changedTouches[0].clientX;_ty=e.changedTouches[0].clientY;_tt=Date.now();e.preventDefault();},{passive:false});
cv.addEventListener('touchend',e=>{
  if(!running)return;
  const dx=e.changedTouches[0].clientX-_tx,dy=e.changedTouches[0].clientY-_ty,dt2=Date.now()-_tt;
  if(dt2<300&&Math.abs(dx)<60&&Math.abs(dy)<60){if(_tx<innerWidth/2)doAtk();else doJump();}
  else if(Math.abs(dy)>Math.abs(dx)){if(dy<-50)doJump();else if(dy>50)doSlide();}
  else{if(dx>70)doWeb();else if(dx<-70)doAtk();}
  e.preventDefault();
},{passive:false});

function wirBtn(id,fn){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{uAC();if(running)fn();e.stopPropagation();e.preventDefault();},{passive:false});
  el.addEventListener('mousedown',e=>{uAC();if(running)fn();e.stopPropagation();});
}
wirBtn('bJ',doJump);wirBtn('bS',doSlide);wirBtn('bA',doAtk);wirBtn('bW',doWeb);
if('ontouchstart' in window||navigator.maxTouchPoints>0)document.getElementById('btns').style.display='block';

function doJump(){
  if(!running||over)return;
  if(pl.jumps<2){
    pl.vy=pl.jumps===0?JUMP1:JUMP2;
    pl.jumps++;pl.sliding=false;
    snd('jump');
    burst(pl.x+PW/2,pl.y+PH,DIMS[dimIdx].ac,6,80);
  }
}
function doSlide(){
  if(!running||over||pl.jumps>0||pl.sliding)return;
  pl.sliding=true;pl.slideT=.55;snd('slide');
}
function doAtk(){
  if(!running||over)return;
  pl.atk=true;pl.atkT=.28;snd('punch');
  const hit=en=>Math.abs((en.x+en.w/2)-(pl.x+PW/2))<92&&Math.abs((en.y+en.h/2)-(pl.y+PH/2))<92;
  foes.forEach(f=>{
    if(f.dead||!hit(f))return;
    f.hp--;burst(f.x+f.w/2,f.y+f.h/2,f.col,7,120);
    if(f.hp<=0){f.dead=true;addSc(50+combo*10,f.x+f.w/2,f.y);addCombo();}
  });
  if(boss&&!boss.dead&&hit(boss)){
    boss.hp--;burst(boss.x+boss.w/2,boss.y+boss.h/2,'#ff0044',10,150);snd('punch');
    if(boss.hp<=0){boss.dead=true;killBoss();}
  }
}
function doWeb(){
  if(!running||over||webM<100)return;
  webOn=true;webT=4.5;webM=0;
  snd('web');burst(pl.x+PW/2,pl.y+PH/2,DIMS[dimIdx].ac,16,200);
}

function addSc(v,x,y){score+=v;if(x!=null)fTxt(x,y,'+'+v,'#ffcc00');}
function addCombo(){combo++;comboT=2.8;}
function hitPl(){
  if(pl.inv||webOn)return;
  lives--;pl.inv=true;pl.invT=2.5;
  combo=0;comboT=0;flashT=.18;flashCol='#f00';snd('hit');
  burst(pl.x+PW/2,pl.y+PH/2,'#ff0000',12,130);
  if(lives<=0)endGame();
}
function killBoss(){
  addSc(500,boss.x+boss.w/2,boss.y);
  fTxt(boss.x+boss.w/2,boss.y-20,'BOSS DOWN!','#ff0044');
  burst(boss.x+boss.w/2,boss.y+boss.h/2,'#ff0044',24,200);
  webM=Math.min(100,webM+50);bossOn=false;nextBossM=meters+1200;
  setTimeout(()=>document.getElementById('bWrap').style.display='none',900);
}

// ── Lifecycle ─────────────────────────────────────────────────────────────────
function startGame(){
  document.getElementById('ov').style.display='none';
  resetPl();walls=[];foes=[];shards=[];bolts=[];parts=[];boss=null;
  score=0;meters=0;lives=3;combo=0;comboT=0;
  spd=300;dimIdx=0;nextDimM=700;
  webM=0;webOn=false;webT=0;flashT=0;
  spawnT=0;spawnI=1.6;bossOn=false;nextBossM=900;
  document.getElementById('bWrap').style.display='none';
  initBldgs();running=true;over=false;lastTs=0;
  requestAnimationFrame(loop);
}
function endGame(){
  running=false;over=true;snd('over');
  if(score>best){best=score;localStorage.setItem(LS,best);}
  setTimeout(showOv,1500);
}
function showOv(){
  document.getElementById('ovSc').textContent=over?'SCORE: '+score.toLocaleString():'';
  document.getElementById('ovBe').textContent=best>0?'BEST: '+best.toLocaleString():'';
  document.getElementById('ovBtn').textContent=over?'PLAY AGAIN':'PLAY';
  document.getElementById('ov').style.display='flex';
}
showOv();
document.getElementById('ovBtn').addEventListener('click',()=>{uAC();startGame();});

// ── Update ────────────────────────────────────────────────────────────────────
let lastTs=0;
function update(dt){
  spd=Math.min(780,300+meters*.075);
  meters+=spd*dt/100;
  score+=~~(spd*dt*.35);

  // Dimension shift
  if(meters>=nextDimM){
    dimIdx=(dimIdx+1)%DIMS.length;
    nextDimM+=700+dimIdx*80;
    const DF=document.getElementById('dFlash');
    DF.textContent='◈ '+DIMS[dimIdx].n+' ◈';
    DF.style.color=DIMS[dimIdx].ac;
    DF.style.textShadow='0 0 20px '+DIMS[dimIdx].ac;
    DF.style.opacity='1';
    setTimeout(()=>DF.style.opacity='0',1800);
    snd('dim');
  }

  // Boss trigger
  if(!bossOn&&!boss&&meters>=nextBossM)spawnBoss();

  // Web power
  if(webOn){
    webT-=dt;
    if(webT<=0){webOn=false;webT=0;}
    parts.push({x:pl.x+PW/2,y:pl.y+PH/2,
      vx:-spd*.08+(Math.random()-.5)*25,vy:(Math.random()-.5)*40,
      life:.22,maxLife:.22,col:DIMS[dimIdx].ac,sz:4.5});
  }
  if(!webOn)webM=Math.min(100,webM+dt*5.5);

  // Countdown timers
  flashT=Math.max(0,flashT-dt);
  if(comboT>0){comboT-=dt;if(comboT<=0)combo=0;}
  if(pl.inv){pl.invT-=dt;if(pl.invT<=0)pl.inv=false;}
  if(pl.sliding){pl.slideT-=dt;if(pl.slideT<=0)pl.sliding=false;}
  if(pl.atk){pl.atkT-=dt;if(pl.atkT<=0)pl.atk=false;}

  // Player physics
  pl.vy+=GRAV*dt;pl.y+=pl.vy*dt;
  if(pl.y+PH>=GY){pl.y=GY-PH;pl.vy=0;pl.jumps=0;}
  if(pl.y<20){pl.y=20;pl.vy=0;}
  pl.runT+=dt;if(pl.runT>.1){pl.runT=0;pl.runF=(pl.runF+1)%4;}

  // Scroll buildings
  bldgs.forEach(b=>{
    b.x-=(b.layer===0?spd*.16:spd*.42)*dt;
    if(b.x+b.w<-10)Object.assign(b,mkBldg(true));
  });

  // Effective hitbox (accounts for sliding)
  const ph2=pl.sliding?PSH:PH;
  const phTop=pl.y+(PH-ph2);
  const hx=pl.x+MRG,hy=phTop+MRG,hw=PW-MRG*2,hh=ph2-MRG*2;

  // Obstacles
  walls=walls.filter(o=>{
    o.x-=spd*dt;
    if(o.x+o.w<0)return false;
    if(!webOn&&!pl.inv&&aabb(hx,hy,hw,hh,o.x,o.y,o.w,o.h))hitPl();
    return true;
  });

  // Enemies
  foes=foes.filter(f=>{
    if(f.dead){f.deathT+=dt;return f.deathT<.5;}
    f.x-=spd*(f.id==='flyer'?.82:.9)*dt;
    if(f.x+f.w<0)return false;
    if(f.id==='flyer'){f.phaseT+=dt;f.y=GY-PH-56-Math.sin(f.phaseT*2.3)*40;}
    if(f.id==='gunner'){
      f.shootCd-=dt;
      if(f.shootCd<=0){
        f.shootCd=Math.max(.6,2.1-meters*.0005);
        bolts.push({x:f.x,y:f.y+f.h/2-6,vx:-340,vy:0,r:7,col:f.col});
      }
    }
    if(!webOn&&!pl.inv&&aabb(hx,hy,hw,hh,f.x,f.y,f.w,f.h))hitPl();
    return true;
  });

  // Boss
  if(boss&&!boss.dead){
    boss.phaseT+=dt;
    boss.x+=boss.movDir*110*dt;
    if(boss.x>GW-110)boss.movDir=-1;
    if(boss.x<GW/2)boss.movDir=1;
    boss.y=GY-boss.h+Math.sin(boss.phaseT*1.5)*18;
    boss.shootCd-=dt;
    if(boss.shootCd<=0){
      boss.shootCd=Math.max(.45,1.2-meters*.0003);
      for(let i=-1;i<=1;i++)
        bolts.push({x:boss.x,y:boss.y+boss.h/2,vx:-400,vy:i*85,r:9,col:'#ff0044'});
      snd('boss');
    }
    if(!webOn&&!pl.inv&&aabb(hx,hy,hw,hh,boss.x,boss.y,boss.w,boss.h))hitPl();
    document.getElementById('bBar').style.width=(boss.hp/boss.maxHp*100)+'%';
  }
  if(boss&&boss.dead){boss.deathT+=dt;if(boss.deathT>.9)boss=null;}

  // Projectiles
  bolts=bolts.filter(b=>{
    b.x+=b.vx*dt;b.y+=b.vy*dt;
    if(b.x<-50||b.x>GW+50||b.y<-50||b.y>GH+50)return false;
    if(!webOn&&!pl.inv&&aabb(hx,hy,hw,hh,b.x-b.r,b.y-b.r,b.r*2,b.r*2)){
      hitPl();burst(b.x,b.y,'#ff88ff',6,90);return false;
    }
    return true;
  });

  // Collectibles
  const magR=webOn?200:0;
  shards=shards.filter(s=>{
    if(s.got)return false;
    s.x-=spd*dt;s.ang+=dt*2.8;
    if(s.x+s.r<0)return false;
    if(magR>0){
      const ddx=(pl.x+PW/2)-s.x,ddy=(pl.y+PH/2)-s.y,dd=Math.hypot(ddx,ddy);
      if(dd<magR&&dd>1){s.x+=ddx/dd*220*dt;s.y+=ddy/dd*220*dt;}
    }
    const reach=webOn?16:3;
    if(aabb(hx-reach,hy-reach,hw+reach*2,hh+reach*2,s.x-s.r,s.y-s.r,s.r*2,s.r*2)){
      s.got=true;
      if(s.type==='shard'){snd('shard');addSc(10,s.x,s.y);webM=Math.min(100,webM+5);addCombo();}
      else if(s.type==='web'){snd('web');webM=100;addSc(30,s.x,s.y);fTxt(s.x,s.y,'WEB READY!','#00ccff');}
      else{snd('shard');pl.inv=true;pl.invT=3;addSc(40,s.x,s.y);flashT=.1;flashCol='#ff0';fTxt(s.x,s.y,'SHIELD!','#ffdd00');}
      burst(s.x,s.y,s.type==='shard'?DIMS[dimIdx].ac:s.type==='web'?'#00ccff':'#ffdd00',8,110);
      return false;
    }
    return true;
  });

  // Particles
  parts=parts.filter(p=>{
    p.life-=dt;if(p.life<=0)return false;
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    if(!p.text)p.vy+=130*dt;
    return true;
  });

  // Spawn (only when no boss)
  if(!bossOn){
    spawnT-=dt;
    if(spawnT<=0){
      doSpawn();
      spawnI=Math.max(.42,1.6-meters*.0009);
      spawnT=spawnI*(.5+Math.random()*.95);
    }
  }

  // HUD
  document.getElementById('hSc').textContent=score.toLocaleString();
  document.getElementById('hDi').textContent=~~meters+'m';
  document.getElementById('hLv').textContent='♥'.repeat(Math.max(0,lives))+'♡'.repeat(Math.max(0,3-lives));
  const hco=document.getElementById('hCo');
  if(combo>1){hco.textContent='COMBO x'+combo;hco.style.opacity='1';}
  else hco.style.opacity='0';
  document.getElementById('wBar').style.width=webM+'%';
  document.getElementById('wBar').style.boxShadow=webM>=100?'0 0 8px #00ccff,0 0 18px #00ccff':'';
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw(){
  const D=DIMS[dimIdx];
  cx.clearRect(0,0,GW,GH);

  // Sky gradient
  const sg=cx.createLinearGradient(0,0,0,GH);
  sg.addColorStop(0,D.b0);sg.addColorStop(1,D.b1);
  cx.fillStyle=sg;cx.fillRect(0,0,GW,GH);

  // Stars (pseudo-random but stable)
  cx.save();
  for(let i=0;i<50;i++){
    const sx=((i*137.5+0.1)%1)*GW;
    const sy=((i*89.3+0.1)%1)*(GY*.55);
    const sa=.2+Math.sin(Date.now()*.0015+i)*.25;
    cx.globalAlpha=sa;cx.fillStyle='#fff';
    cx.fillRect(sx,sy,i%3===0?2:1,i%3===0?2:1);
  }
  cx.restore();

  // Buildings (far layer)
  bldgs.filter(b=>b.layer===0).forEach(b=>drawBldg(b,D,.24));
  // Buildings (near layer)
  bldgs.filter(b=>b.layer===1).forEach(b=>drawBldg(b,D,.5));

  // Ground
  drawGround(D);

  // Collectibles
  shards.forEach(s=>drawShard(s,D));

  // Obstacles
  walls.forEach(o=>drawObst(o,D));

  // Enemies
  foes.forEach(f=>drawFoe(f));

  // Boss
  if(boss)drawBoss();

  // Projectiles
  bolts.forEach(b=>{
    cx.save();
    cx.shadowBlur=14;cx.shadowColor=b.col;cx.fillStyle=b.col;
    cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fill();
    cx.globalAlpha=.4;
    cx.beginPath();cx.arc(b.x-b.vx*.02,b.y-b.vy*.02,b.r*.65,0,Math.PI*2);cx.fill();
    cx.restore();
  });

  // Player
  drawPlayer(D);

  // Particles
  parts.forEach(p=>{
    const a=p.life/p.maxLife;
    cx.save();cx.globalAlpha=Math.min(1,a*1.6);
    if(p.text){
      cx.font='bold 14px monospace';cx.fillStyle=p.col;
      cx.shadowBlur=6;cx.shadowColor=p.col;cx.fillText(p.text,p.x,p.y);
    }else{
      cx.fillStyle=p.col;cx.shadowBlur=5;cx.shadowColor=p.col;
      cx.beginPath();cx.arc(p.x,p.y,Math.max(.5,p.sz*a),0,Math.PI*2);cx.fill();
    }
    cx.restore();
  });

  // Hit flash
  if(flashT>0){
    cx.save();cx.globalAlpha=(flashT/.18)*.38;
    cx.fillStyle=flashCol;cx.fillRect(0,0,GW,GH);cx.restore();
  }

  // Web-active tint + threads
  if(webOn){
    cx.save();
    cx.globalAlpha=.05+Math.sin(Date.now()*.012)*.025;
    cx.fillStyle='#0044ff';cx.fillRect(0,0,GW,GH);
    cx.globalAlpha=.55;cx.strokeStyle=DIMS[dimIdx].ac;cx.lineWidth=2;
    cx.shadowBlur=8;cx.shadowColor=DIMS[dimIdx].ac;
    pl.webAng+=.04;
    for(let i=0;i<4;i++){
      const a=pl.webAng+i*Math.PI/2;
      cx.beginPath();
      cx.moveTo(pl.x+PW/2,pl.y+PH/2);
      cx.lineTo(pl.x+PW/2+Math.cos(a)*115,pl.y+PH/2+Math.sin(a)*78);
      cx.stroke();
    }
    cx.restore();
  }
}

// ── Draw helpers ──────────────────────────────────────────────────────────────
function drawBldg(b,D,al){
  cx.save();cx.globalAlpha=al;
  cx.fillStyle=D.b1;cx.fillRect(b.x,b.y,b.w,b.h);
  cx.fillStyle=D.ac;cx.shadowBlur=4;cx.shadowColor=D.ac;
  b.wins.forEach(w=>{
    cx.globalAlpha=al*(.15+Math.sin(Date.now()*.0008+b.x+w.x*.03)*.1);
    cx.fillRect(b.x+w.x,b.y+w.y,5,7);
  });
  cx.restore();
}

function drawGround(D){
  cx.save();
  const gg=cx.createLinearGradient(0,GY,0,GH);
  gg.addColorStop(0,D.gn);gg.addColorStop(1,'#000');
  cx.fillStyle=gg;cx.fillRect(0,GY,GW,GH-GY);
  cx.strokeStyle=D.ac;cx.lineWidth=2;cx.shadowBlur=10;cx.shadowColor=D.ac;
  cx.beginPath();cx.moveTo(0,GY);cx.lineTo(GW,GY);cx.stroke();
  // Perspective speed lines
  cx.globalAlpha=.1;cx.lineWidth=1;cx.shadowBlur=0;
  const gs=90,go=(Date.now()*spd*.001)%gs;
  for(let x=-go;x<GW+gs;x+=gs){
    cx.beginPath();cx.moveTo(x,GY);cx.lineTo(x+65,GH);cx.stroke();
  }
  cx.restore();
}

function drawShard(s,D){
  cx.save();
  if(s.type==='shard'){
    cx.fillStyle=D.ac;cx.shadowBlur=10;cx.shadowColor=D.ac;
    hexP(s.x,s.y,s.r,s.ang);cx.fill();
    cx.fillStyle='#fff8';cx.shadowBlur=3;hexP(s.x,s.y,s.r*.42,s.ang+.5);cx.fill();
  }else if(s.type==='web'){
    cx.fillStyle='#00ccff';cx.shadowBlur=18;cx.shadowColor='#00ffff';
    hexP(s.x,s.y,s.r,s.ang);cx.fill();
    cx.fillStyle='#ffffff';cx.shadowBlur=6;hexP(s.x,s.y,s.r*.48,s.ang+.5);cx.fill();
  }else{
    cx.fillStyle='#ffdd00';cx.shadowBlur=14;cx.shadowColor='#ffdd00';
    cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();
    cx.strokeStyle='#fff';cx.lineWidth=2;cx.globalAlpha=.7;
    cx.beginPath();cx.arc(s.x,s.y,s.r*.62,0,Math.PI*2);cx.stroke();
  }
  cx.restore();
}

function hexP(x,y,r,a){
  cx.beginPath();
  for(let i=0;i<6;i++){const t=a+i*Math.PI/3;
    i?cx.lineTo(x+r*Math.cos(t),y+r*Math.sin(t)):cx.moveTo(x+r*Math.cos(t),y+r*Math.sin(t));}
  cx.closePath();
}

function drawObst(o,D){
  const gate=o.id==='gate';
  cx.save();
  cx.fillStyle=gate?'#180030':'#220010';
  cx.shadowBlur=8;cx.shadowColor=gate?'#9900ff':'#ff3300';
  cx.fillRect(o.x,o.y,o.w,o.h);
  cx.strokeStyle=gate?'#cc00ff':'#ff4400';cx.lineWidth=2;
  cx.strokeRect(o.x,o.y,o.w,o.h);
  // Warning stripes (clipped)
  cx.save();cx.beginPath();cx.rect(o.x,o.y,o.w,o.h);cx.clip();
  cx.strokeStyle=(gate?'#cc00ff':'#ff4400')+'44';cx.lineWidth=10;
  for(let i=-o.h;i<o.w+o.h;i+=20){
    cx.beginPath();cx.moveTo(o.x+i,o.y);cx.lineTo(o.x+i+o.h,o.y+o.h);cx.stroke();
  }
  cx.restore();
  cx.restore();
}

function drawFoe(f){
  if(f.dead){
    cx.save();cx.globalAlpha=Math.max(0,1-f.deathT/.5);
    cx.shadowBlur=22;cx.shadowColor=f.col;cx.fillStyle=f.col;
    const sr=22*(1-f.deathT/.5);
    cx.beginPath();cx.arc(f.x+f.w/2,f.y+f.h/2,sr,0,Math.PI*2);cx.fill();
    cx.restore();return;
  }
  cx.save();
  cx.shadowBlur=10;cx.shadowColor=f.col;cx.fillStyle=f.col;
  cx.fillRect(f.x+3,f.y+f.h*.28,f.w-6,f.h*.62);
  cx.beginPath();cx.arc(f.x+f.w/2,f.y+f.h*.14,f.w*.28,0,Math.PI*2);cx.fill();
  cx.fillStyle='#ff0000';cx.shadowBlur=4;cx.shadowColor='#f00';
  cx.fillRect(f.x+f.w*.26,f.y+f.h*.1,5,4);
  cx.fillRect(f.x+f.w*.56,f.y+f.h*.1,5,4);
  if(f.id==='flyer'){
    cx.fillStyle=f.col+'88';
    cx.save();cx.translate(f.x+f.w/2,f.y+f.h*.24);
    const flap=Math.sin(f.phaseT*9)*.3;
    cx.beginPath();cx.moveTo(0,0);cx.lineTo(-30,-12+flap*18);cx.lineTo(-6,f.h*.35);cx.fill();
    cx.beginPath();cx.moveTo(0,0);cx.lineTo(30,-12-flap*18);cx.lineTo(6,f.h*.35);cx.fill();
    cx.restore();
  }
  if(f.maxHp>1){
    cx.fillStyle='#333';cx.fillRect(f.x,f.y-10,f.w,5);
    cx.fillStyle='#00ff44';cx.fillRect(f.x,f.y-10,f.w*(f.hp/f.maxHp),5);
  }
  cx.restore();
}

function drawBoss(){
  if(boss.dead){
    cx.save();cx.globalAlpha=Math.max(0,1-boss.deathT/.9);
    for(let i=0;i<3;i++){
      const r=(40+i*18)*(boss.deathT/.9);
      cx.strokeStyle='#ff0044';cx.lineWidth=3;cx.shadowBlur=14;cx.shadowColor='#ff0044';
      cx.globalAlpha=Math.max(0,(1-boss.deathT/.9)*.7);
      cx.beginPath();cx.arc(boss.x+boss.w/2,boss.y+boss.h/2,r,0,Math.PI*2);cx.stroke();
    }
    cx.restore();return;
  }
  cx.save();
  // Body glow
  cx.shadowBlur=20;cx.shadowColor='#ff0044';
  // Torso
  const bg=cx.createLinearGradient(boss.x,boss.y,boss.x+boss.w,boss.y+boss.h);
  bg.addColorStop(0,'#440010');bg.addColorStop(1,'#aa0030');
  cx.fillStyle=bg;cx.fillRect(boss.x,boss.y+boss.h*.28,boss.w,boss.h*.65);
  // Head
  cx.fillStyle='#880020';
  cx.beginPath();cx.arc(boss.x+boss.w/2,boss.y+boss.h*.14,boss.w*.32,0,Math.PI*2);cx.fill();
  // Glowing eyes
  cx.fillStyle='#ff0044';cx.shadowBlur=10;cx.shadowColor='#ff0044';
  cx.beginPath();cx.arc(boss.x+boss.w*.33,boss.y+boss.h*.12,5,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(boss.x+boss.w*.67,boss.y+boss.h*.12,5,0,Math.PI*2);cx.fill();
  // Armor lines
  cx.strokeStyle='#ff0044';cx.lineWidth=2;cx.globalAlpha=.5;
  cx.strokeRect(boss.x+4,boss.y+boss.h*.3,boss.w-8,boss.h*.6);
  cx.beginPath();cx.moveTo(boss.x+boss.w/2,boss.y+boss.h*.3);
  cx.lineTo(boss.x+boss.w/2,boss.y+boss.h*.9);cx.stroke();
  // HP indicator
  cx.globalAlpha=.8;cx.fillStyle='#333';cx.fillRect(boss.x,boss.y-14,boss.w,8);
  cx.fillStyle='#ff0044';cx.fillRect(boss.x,boss.y-14,boss.w*(boss.hp/boss.maxHp),8);
  cx.restore();
}

function drawPlayer(D){
  const ph2=pl.sliding?PSH:PH;
  const pTop=pl.y+(PH-ph2);

  // Invincibility blink
  if(pl.inv&&!webOn&&Math.floor(Date.now()/80)%2===0)return;

  cx.save();
  const gc=webOn?'#00e5ff':D.ac;
  cx.shadowBlur=webOn?22:12;cx.shadowColor=gc;

  // Slide cape
  if(pl.sliding){
    cx.fillStyle=gc+'38';
    cx.beginPath();cx.moveTo(pl.x,pTop+ph2);
    cx.lineTo(pl.x-38,pTop+ph2+4);cx.lineTo(pl.x,pTop+ph2*.3);cx.fill();
  }

  // Legs (running animation)
  if(!pl.sliding){
    const lOff=pl.runF%2===0?3:-3;
    cx.fillStyle=webOn?'#0077aa':'#003380';
    cx.fillRect(pl.x+4,pTop+ph2*.86+lOff,PW*.38,ph2*.14+5);
    cx.fillRect(pl.x+PW*.58,pTop+ph2*.86-lOff,PW*.38,ph2*.14+5);
  }

  // Body
  const bg2=cx.createLinearGradient(pl.x,pTop+ph2*.3,pl.x+PW,pTop+ph2);
  bg2.addColorStop(0,webOn?'#0099cc':'#0044cc');
  bg2.addColorStop(1,webOn?'#006688':'#002288');
  cx.fillStyle=bg2;cx.fillRect(pl.x+3,pTop+ph2*.27,PW-6,ph2*.62);

  // Web symbol on chest
  cx.strokeStyle=gc;cx.lineWidth=1.5;cx.globalAlpha=.65;
  cx.shadowBlur=4;
  cx.beginPath();cx.arc(pl.x+PW/2,pTop+ph2*.55,PW*.22,0,Math.PI*2);cx.stroke();
  cx.beginPath();cx.moveTo(pl.x+PW/2-PW*.22,pTop+ph2*.55);
  cx.lineTo(pl.x+PW/2+PW*.22,pTop+ph2*.55);cx.stroke();
  cx.beginPath();cx.moveTo(pl.x+PW/2,pTop+ph2*.33);
  cx.lineTo(pl.x+PW/2,pTop+ph2*.77);cx.stroke();
  cx.globalAlpha=1;cx.shadowBlur=webOn?22:12;

  // Head
  cx.fillStyle=webOn?'#0099cc':'#0044cc';
  cx.beginPath();cx.arc(pl.x+PW/2,pTop+ph2*.15,PW*.3,0,Math.PI*2);cx.fill();

  // Visor eyes
  cx.fillStyle=gc;cx.shadowBlur=6;cx.shadowColor=gc;
  cx.beginPath();cx.ellipse(pl.x+PW*.32,pTop+ph2*.13,5,3.5,-.3,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(pl.x+PW*.68,pTop+ph2*.13,5,3.5,.3,0,Math.PI*2);cx.fill();

  // Attack arc
  if(pl.atk){
    cx.strokeStyle=gc;cx.lineWidth=3;cx.shadowBlur=18;cx.globalAlpha=.9;
    cx.beginPath();cx.arc(pl.x+PW+16,pTop+ph2/2,34,-Math.PI*.55,Math.PI*.55);cx.stroke();
    cx.strokeStyle='#fff';cx.lineWidth=1.5;cx.globalAlpha=.45;
    cx.beginPath();cx.arc(pl.x+PW+16,pTop+ph2/2,25,-Math.PI*.45,Math.PI*.45);cx.stroke();
  }
  cx.restore();
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop(ts){
  const dt=lastTs===0?0.016:Math.min((ts-lastTs)/1000,.05);
  lastTs=ts;
  if(running){update(dt);draw();}
  if(running)requestAnimationFrame(loop);
}
</script>
