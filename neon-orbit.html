<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEON ORBIT">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#05060f">
<title>NEON ORBIT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#05060f;position:fixed;overscroll-behavior:none;touch-action:none;
  font-family:'Courier New',Courier,monospace}
#wrap{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
canvas{display:block;background:#05060f;touch-action:none}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;pointer-events:none;
  padding:calc(8px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) 0 calc(12px + env(safe-area-inset-left));
  font-size:15px;font-weight:bold;letter-spacing:1px;color:#0ff;text-shadow:0 0 8px #0ff}
#hud .best{color:#f0f;text-shadow:0 0 8px #f0f}
.panel{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  background:rgba(5,6,15,.72);color:#cff;z-index:5}
.panel h1{font-size:34px;letter-spacing:5px;color:#0ff;text-shadow:0 0 12px #0ff,0 0 30px #0ff;margin-bottom:6px}
.panel h1 span{color:#f0f;text-shadow:0 0 12px #f0f,0 0 30px #f0f}
.panel p{font-size:14px;line-height:1.9;letter-spacing:1px;margin:4px 14px}
.panel .tap{margin-top:22px;font-size:16px;color:#ff0;text-shadow:0 0 10px #ff0;animation:blink 1.1s step-end infinite}
.panel .big{font-size:26px;color:#0ff;text-shadow:0 0 10px #0ff}
@keyframes blink{50%{opacity:.25}}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud"><div id="score">0m</div><div class="best" id="best">BEST 0</div></div>
  <div class="panel" id="menu">
    <h1>NEON<span>ORBIT</span></h1>
    <p>Drift into a planet's pull and you orbit it.<br>
    <b style="color:#ff0">TAP</b> to sling off along your path.<br>
    Climb forever. Grab <span style="color:#ff0">&#9733;</span> stars.<br>
    <span style="color:#f0f">Spiked planets</span> shred you. Don't fall.</p>
    <div class="tap">TAP TO LAUNCH</div>
  </div>
  <div class="panel" id="dead" style="display:none">
    <h1>WRECKED</h1>
    <p class="big" id="finalScore">0</p>
    <p id="finalBest">BEST 0</p>
    <div class="tap">TAP TO RETRY</div>
  </div>
  <div class="panel" id="pause" style="display:none">
    <h1>PAUSED</h1><div class="tap">TAP TO RESUME</div>
  </div>
</div>
<script>
'use strict';
// ---- stage: fixed internal resolution, CSS-scaled to viewport (same pattern as NEON TANK) ----
const LW=480, LH=Math.max(700,Math.min(1000,Math.round(LW*innerHeight/Math.max(1,innerWidth))));
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
cv.width=LW; cv.height=LH;
function fitStage(){const iw=innerWidth, ih=innerHeight, s=Math.min(iw/LW, ih/LH);
  cv.style.width=(LW*s)+'px'; cv.style.height=(LH*s)+'px';}
fitStage();
addEventListener('resize',fitStage); addEventListener('orientationchange',fitStage);
if(window.visualViewport) visualViewport.addEventListener('resize',fitStage);

// ---- iOS gesture suppression ----
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('gesturechange',e=>e.preventDefault());
let lastTouchEnd=0;
document.addEventListener('touchend',e=>{const n=Date.now(); if(n-lastTouchEnd<300)e.preventDefault(); lastTouchEnd=n;},{passive:false});
document.addEventListener('contextmenu',e=>e.preventDefault());

// ---- audio: shared context, synth SFX, unlocked on first gesture ----
let AC=null;
function resumeAC(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(AC&&AC.state==='suspended')AC.resume();}
let noiseBuf=null;
function getNoise(){if(noiseBuf||!AC)return noiseBuf;
  noiseBuf=AC.createBuffer(1,AC.sampleRate*0.4,AC.sampleRate);
  const d=noiseBuf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1; return noiseBuf;}
function snd(t){if(!AC||AC.state!=='running')return; const n=AC.currentTime;
  if(t==='sling'){const o=AC.createOscillator(),g=AC.createGain();o.type='sawtooth';
    o.frequency.setValueAtTime(180,n);o.frequency.exponentialRampToValueAtTime(720,n+.14);
    g.gain.setValueAtTime(.14,n);g.gain.exponentialRampToValueAtTime(.001,n+.18);
    o.connect(g).connect(AC.destination);o.start(n);o.stop(n+.2);}
  else if(t==='latch'){const o=AC.createOscillator(),g=AC.createGain();o.type='sine';
    o.frequency.setValueAtTime(340,n);o.frequency.exponentialRampToValueAtTime(170,n+.1);
    g.gain.setValueAtTime(.12,n);g.gain.exponentialRampToValueAtTime(.001,n+.12);
    o.connect(g).connect(AC.destination);o.start(n);o.stop(n+.13);}
  else if(t==='star'){[880,1320].forEach((f,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.type='square';
    o.frequency.value=f;g.gain.setValueAtTime(.07,n+i*.05);g.gain.exponentialRampToValueAtTime(.001,n+i*.05+.12);
    o.connect(g).connect(AC.destination);o.start(n+i*.05);o.stop(n+i*.05+.13);});}
  else if(t==='bounce'){const o=AC.createOscillator(),g=AC.createGain();o.type='triangle';
    o.frequency.setValueAtTime(120,n);o.frequency.exponentialRampToValueAtTime(60,n+.08);
    g.gain.setValueAtTime(.15,n);g.gain.exponentialRampToValueAtTime(.001,n+.1);
    o.connect(g).connect(AC.destination);o.start(n);o.stop(n+.11);}
  else if(t==='die'){const s=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();
    s.buffer=getNoise();f.type='lowpass';f.frequency.setValueAtTime(2200,n);f.frequency.exponentialRampToValueAtTime(120,n+.4);
    g.gain.setValueAtTime(.3,n);g.gain.exponentialRampToValueAtTime(.001,n+.45);
    s.connect(f).connect(g).connect(AC.destination);s.start(n);
    const o=AC.createOscillator(),g2=AC.createGain();o.type='sawtooth';
    o.frequency.setValueAtTime(220,n);o.frequency.exponentialRampToValueAtTime(40,n+.4);
    g2.gain.setValueAtTime(.16,n);g2.gain.exponentialRampToValueAtTime(.001,n+.4);
    o.connect(g2).connect(AC.destination);o.start(n);o.stop(n+.42);}
  else if(t==='best'){[523,659,784,1047].forEach((f,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.type='square';
    o.frequency.value=f;g.gain.setValueAtTime(.08,n+i*.09);g.gain.exponentialRampToValueAtTime(.001,n+i*.09+.16);
    o.connect(g).connect(AC.destination);o.start(n+i*.09);o.stop(n+i*.09+.17);});}}

// ---- tuning ----
const G=310;                // gravity while flying (px/s^2)
const BOOST=1.3;            // sling speed multiplier on release
const LATCH_R=70;           // extra reach beyond planet radius for auto-latch
const ORB_MIN=15, ORB_MAX=70;
const HSKEY='neonOrbitHS1';
function baseSpeed(h){return Math.min(560, 320 + h*0.05);} // orbital speed ramps with height (m)

// ---- state ----
let mode='menu'; // menu | play | dead | pause
let ship, planets, stars, parts, camY, topGenY, startY, heightM, starCt, score, shake, tPrev=0, tapLockUntil=0;
let best=parseInt(localStorage.getItem(HSKEY)||'0',10)||0;
document.getElementById('best').textContent='BEST '+best;
const bgStars=[]; for(let i=0;i<90;i++)bgStars.push({x:Math.random()*LW,y:Math.random()*LH,z:Math.random()<0.5?0.15:0.35,s:Math.random()*1.6+0.6});

const rand=(a,b)=>a+Math.random()*(b-a);
const HUES=[190,150,255,210,25,45];  // no magenta: that's reserved for spiked hazards

function makePlanet(x,y,spiked){
  const r=rand(22,42);
  const mov=(!spiked && Math.random()<Math.min(0.4,heightM/700)) ? {amp:rand(35,80),spd:rand(0.6,1.3),ph:rand(0,6.28)} : null;
  return {x,y,bx:x,r,spiked,mov,vx:0,px:x,hue:spiked?310:HUES[(Math.random()*HUES.length)|0]};}

let genX=LW/2;
function genUpTo(limitY){
  while(topGenY>limitY){
    const gap=rand(108,168); topGenY-=gap;
    const x=genX=Math.min(LW-64,Math.max(64,genX+rand(-165,165)));
    const pSpike=Math.min(0.34, 0.05+heightM/900);
    const spiked=heightM>40 && Math.random()<pSpike;
    const p=makePlanet(x,topGenY,spiked); planets.push(p);
    if(Math.random()<0.62){const a=rand(0,6.28),d=p.r+rand(38,86);
      stars.push({x:Math.min(LW-14,Math.max(14,p.x+Math.cos(a)*d)),y:p.y+Math.sin(a)*d,ph:rand(0,6.28)});}
  }}

function reset(){
  ship={x:LW/2,y:-60,vx:0,vy:0,fly:false,p:null,orbR:0,ang:-Math.PI/2,angV:0,lastP:null,relT:0,trail:[]};
  planets=[]; stars=[]; parts=[]; shake=0; starCt=0; heightM=0; score=0;
  startY=ship.y; camY=ship.y-LH*0.62; topGenY=0; genX=LW/2;
  const p0=makePlanet(LW/2,0,false); p0.r=34; planets.push(p0);
  latch(p0); ship.angV=baseSpeed(0)/ship.orbR;   // start already in orbit
  genUpTo(camY-300);}

function latch(p){
  const dx=ship.x-p.x, dy=ship.y-p.y, d=Math.hypot(dx,dy)||1;
  ship.fly=false; ship.p=p; ship.orbR=Math.min(p.r+ORB_MAX,Math.max(p.r+ORB_MIN,d));
  ship.orbTarget=p.r+28;  // orbit spirals in toward a tight radius after latching
  ship.ang=Math.atan2(dy,dx);
  const cross=dx*ship.vy-dy*ship.vx; ship.angV=(cross>=0?1:-1)*baseSpeed(heightM)/ship.orbR;
  burst(ship.x,ship.y,'#0ff',8); snd('latch');}

function sling(){
  const p=ship.p;
  ship.vx=-Math.sin(ship.ang)*ship.angV*ship.orbR*BOOST+(p.vx||0);
  ship.vy= Math.cos(ship.ang)*ship.angV*ship.orbR*BOOST;
  ship.fly=true; ship.lastP=p; ship.relT=0; ship.p=null;
  burst(ship.x,ship.y,'#ff0',12); snd('sling'); shake=Math.max(shake,3);}

function burst(x,y,col,n){for(let i=0;i<n;i++){const a=rand(0,6.28),s=rand(40,200);
  parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(.25,.6),t:0,col});}}

function die(){
  mode='dead'; snd('die'); shake=10; burst(ship.x,ship.y,'#f0f',26); burst(ship.x,ship.y,'#0ff',20);
  score=Math.floor(heightM)+starCt*15;
  if(score>best){best=score; localStorage.setItem(HSKEY,String(best)); snd('best');
    document.getElementById('finalBest').innerHTML='<span style="color:#ff0">&#9733; NEW BEST &#9733;</span>';}
  else document.getElementById('finalBest').textContent='BEST '+best;
  document.getElementById('finalScore').innerHTML=score+'&nbsp; <span style="font-size:14px;color:#9df">'+Math.floor(heightM)+'m + '+starCt+'&#9733;</span>';
  document.getElementById('best').textContent='BEST '+best;
  setTimeout(()=>{document.getElementById('dead').style.display='flex'; tapLockUntil=performance.now()+400;},420);}

// ---- input: tap = sling (pointer events cover touch+mouse); Space works on desktop ----
function press(){
  resumeAC(); const now=performance.now(); if(now<tapLockUntil)return;
  if(mode==='menu'||mode==='dead'){
    document.getElementById('menu').style.display='none';
    document.getElementById('dead').style.display='none';
    reset(); mode='play'; tapLockUntil=now+180; return;}
  if(mode==='pause'){document.getElementById('pause').style.display='none'; mode='play'; tPrev=0; return;}
  if(mode==='play'&&!ship.fly) sling();}
addEventListener('pointerdown',e=>{e.preventDefault(); press();},{passive:false});
addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault(); press();}
  else if(e.code==='Escape'&&mode==='play'){mode='pause';document.getElementById('pause').style.display='flex';}});
document.addEventListener('visibilitychange',()=>{if(document.hidden&&mode==='play'){
  mode='pause';document.getElementById('pause').style.display='flex';}});

// ---- update ----
function update(dt){
  if(dt<=0)return;
  // planets drift
  for(const p of planets){p.px=p.x;
    if(p.mov){p.mov.ph+=p.mov.spd*dt; p.x=Math.min(LW-p.r-8,Math.max(p.r+8,p.bx+Math.sin(p.mov.ph)*p.mov.amp));}
    p.vx=(p.x-p.px)/dt;}
  if(ship.fly){
    ship.relT+=dt;
    ship.vy+=G*dt; if(ship.vy>700)ship.vy=700;
    ship.x+=ship.vx*dt; ship.y+=ship.vy*dt;
    if(ship.x<8){ship.x=8;ship.vx=Math.abs(ship.vx)*0.9;snd('bounce');}
    if(ship.x>LW-8){ship.x=LW-8;ship.vx=-Math.abs(ship.vx)*0.9;snd('bounce');}
    // collisions & auto-latch
    for(const p of planets){
      const d=Math.hypot(ship.x-p.x,ship.y-p.y);
      if(p.spiked){ if(d<p.r+9){die();return;} continue;}
      if(d<p.r+6){ // smacked the surface: soft bounce off
        const nx=(ship.x-p.x)/d, ny=(ship.y-p.y)/d, dot=ship.vx*nx+ship.vy*ny;
        ship.vx=(ship.vx-2*dot*nx)*0.55; ship.vy=(ship.vy-2*dot*ny)*0.55;
        ship.x=p.x+nx*(p.r+7); ship.y=p.y+ny*(p.r+7); snd('bounce'); shake=Math.max(shake,2); continue;}
      if(d<p.r+LATCH_R && !(p===ship.lastP&&ship.relT<1.35)){latch(p);break;}}
  }else{
    const p=ship.p, dir=ship.angV>=0?1:-1;
    ship.orbR+=(ship.orbTarget-ship.orbR)*Math.min(1,dt*1.6);
    ship.angV=dir*baseSpeed(heightM)/ship.orbR;
    ship.ang+=ship.angV*dt;
    ship.x=p.x+Math.cos(ship.ang)*ship.orbR;
    ship.y=p.y+Math.sin(ship.ang)*ship.orbR;
  }
  // trail
  ship.trail.push({x:ship.x,y:ship.y,t:0});
  for(const q of ship.trail)q.t+=dt;
  while(ship.trail.length&&ship.trail[0].t>0.35)ship.trail.shift();
  // stars
  for(const s of stars){if(!s.got&&Math.hypot(ship.x-s.x,ship.y-s.y)<24){s.got=true;starCt++;snd('star');burst(s.x,s.y,'#ff0',10);}}
  // camera climbs, never descends
  const target=ship.y-LH*0.58;
  if(target<camY)camY+=(target-camY)*Math.min(1,dt*6);
  heightM=Math.max(heightM,(startY-ship.y)/10);
  genUpTo(camY-300);
  planets=planets.filter(p=>p.y<camY+LH+240);
  stars=stars.filter(s=>!s.got&&s.y<camY+LH+240);
  // fell off the bottom
  if(ship.y>camY+LH+50){die();return;}
  // particles
  for(const q of parts){q.t+=dt;q.x+=q.vx*dt;q.y+=q.vy*dt;q.vx*=0.98;q.vy*=0.98;}
  parts=parts.filter(q=>q.t<q.life);
  if(shake>0)shake=Math.max(0,shake-dt*22);
  score=Math.floor(heightM)+starCt*15;
  document.getElementById('score').textContent=score+' · '+Math.floor(heightM)+'m';
}

// ---- draw ----
function draw(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle='#05060f'; ctx.fillRect(0,0,LW,LH);
  const sx=shake?rand(-shake,shake):0, sy=shake?rand(-shake,shake):0;
  // parallax starfield (screen-space, scrolls with camera)
  for(const b of bgStars){const y=(((b.y-camY*b.z)%LH)+LH)%LH;
    ctx.globalAlpha=b.z===0.15?0.4:0.7; ctx.fillStyle='#8ff';
    ctx.fillRect(b.x,y,b.s,b.s);}
  ctx.globalAlpha=1;
  ctx.translate(sx,sy-camY);
  // planets
  for(const p of planets){
    if(p.y<camY-120||p.y>camY+LH+120)continue;
    ctx.save();
    if(p.spiked){
      ctx.strokeStyle='#f0f'; ctx.shadowColor='#f0f'; ctx.shadowBlur=14; ctx.lineWidth=2;
      ctx.beginPath();
      const n=Math.max(9,(p.r*0.45)|0);
      for(let i=0;i<n*2;i++){const a=i/(n*2)*Math.PI*2, rr=i%2?p.r+9:p.r-3;
        const X=p.x+Math.cos(a)*rr, Y=p.y+Math.sin(a)*rr; i?ctx.lineTo(X,Y):ctx.moveTo(X,Y);}
      ctx.closePath(); ctx.stroke();
      ctx.fillStyle='rgba(255,0,255,0.10)'; ctx.fill();
    }else{
      const col='hsl('+p.hue+',100%,60%)';
      ctx.strokeStyle=col; ctx.shadowColor=col; ctx.shadowBlur=16; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.2832); ctx.stroke();
      ctx.fillStyle='hsla('+p.hue+',100%,55%,0.10)'; ctx.fill();
      ctx.shadowBlur=0; ctx.strokeStyle='hsla('+p.hue+',100%,70%,0.35)';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*0.55,0,6.2832); ctx.stroke();
    }
    ctx.restore();}
  // stars (pickups)
  const tNow=performance.now()/1000;
  for(const s of stars){
    if(s.y<camY-40||s.y>camY+LH+40)continue;
    const tw=0.75+Math.sin(tNow*5+s.ph)*0.25;
    ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(tNow+s.ph); ctx.scale(tw,tw);
    ctx.strokeStyle='#ff0'; ctx.shadowColor='#ff0'; ctx.shadowBlur=12; ctx.lineWidth=2;
    ctx.beginPath();
    for(let i=0;i<10;i++){const a=i/10*Math.PI*2-Math.PI/2, rr=i%2?4:10;
      const X=Math.cos(a)*rr, Y=Math.sin(a)*rr; i?ctx.lineTo(X,Y):ctx.moveTo(X,Y);}
    ctx.closePath(); ctx.stroke(); ctx.restore();}
  if(mode==='play'||mode==='pause'||mode==='dead'){
    // orbit ring + aim preview while latched
    if(!ship.fly&&ship.p&&mode!=='dead'){
      ctx.save(); ctx.strokeStyle='rgba(0,255,255,0.28)'; ctx.setLineDash([4,7]); ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(ship.p.x,ship.p.y,ship.orbR,0,6.2832); ctx.stroke();
      const tx=-Math.sin(ship.ang)*(ship.angV>=0?1:-1), ty=Math.cos(ship.ang)*(ship.angV>=0?1:-1);
      ctx.strokeStyle='rgba(255,255,0,0.5)'; ctx.setLineDash([3,8]); ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(ship.x,ship.y);
      ctx.lineTo(ship.x+tx*130,ship.y+ty*130); ctx.stroke(); ctx.restore();}
    // trail
    ctx.save(); ctx.lineCap='round';
    for(let i=1;i<ship.trail.length;i++){const q=ship.trail[i],r=ship.trail[i-1],a=1-q.t/0.35;
      ctx.strokeStyle='rgba(0,255,255,'+(a*0.5)+')'; ctx.lineWidth=a*5;
      ctx.beginPath(); ctx.moveTo(r.x,r.y); ctx.lineTo(q.x,q.y); ctx.stroke();}
    ctx.restore();
    // ship
    if(mode!=='dead'){
      let hx,hy;
      if(ship.fly){const m=Math.hypot(ship.vx,ship.vy)||1;hx=ship.vx/m;hy=ship.vy/m;}
      else{const d=ship.angV>=0?1:-1;hx=-Math.sin(ship.ang)*d;hy=Math.cos(ship.ang)*d;}
      ctx.save(); ctx.translate(ship.x,ship.y); ctx.rotate(Math.atan2(hy,hx));
      ctx.strokeStyle='#0ff'; ctx.fillStyle='rgba(0,255,255,0.25)';
      ctx.shadowColor='#0ff'; ctx.shadowBlur=14; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(11,0); ctx.lineTo(-8,-7); ctx.lineTo(-4,0); ctx.lineTo(-8,7);
      ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();}
  }
  // particles
  for(const q of parts){const a=1-q.t/q.life;
    ctx.globalAlpha=a; ctx.fillStyle=q.col; ctx.fillRect(q.x-2,q.y-2,4,4);}
  ctx.globalAlpha=1;
}

// ---- loop ----
function loop(ts){
  requestAnimationFrame(loop);
  if(!tPrev)tPrev=ts;
  let dt=(ts-tPrev)/1000; tPrev=ts;
  if(dt>0.05)dt=0.05;
  if(mode==='play')update(dt);
  else if(mode==='dead'){for(const q of parts){q.t+=dt;q.x+=q.vx*dt;q.y+=q.vy*dt;}
    parts=parts.filter(q=>q.t<q.life); if(shake>0)shake=Math.max(0,shake-dt*22);}
  draw();
}
reset(); mode='menu';
requestAnimationFrame(loop);
</script>
</body>
</html>
